<title>The Curve Consultants Review Generator</title>

<style>
body{
font-family:system-ui,Segoe UI;
background:#f5f6fa;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.card{
background:#fff;
padding:28px;
border-radius:16px;
box-shadow:0 8px 30px rgba(0,0,0,.08);
width:100%;
max-width:520px;
}

h2{margin:0 0 8px;font-size:16px}
p{margin:0 0 18px;color:#64748b;font-size:13px}

.section-label{
font-size:11px;
font-weight:700;
letter-spacing:.6px;
color:#94a3b8;
margin:14px 0 6px;
}

/* Stars */
.stars-row{display:flex;gap:4px;margin-bottom:16px}
.star{font-size:28px;color:#e2e8f0;cursor:pointer;transition:.15s}
.star.active{color:#fbbc04}
.star:hover{transform:scale(1.15)}

/* Tone */
.tone-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.tone-btn{
border:2px solid #cbd5e1;
border-radius:20px;
padding:7px 14px;
font-size:13px;
font-weight:600;
cursor:pointer;
background:#fff;
color:#334155;
transition:.18s;
}
.tone-btn:hover{
border-color:#2563eb;
color:#2563eb;
background:#eff6ff;
}
.tone-btn.selected{
border-color:#2563eb;
background:#2563eb;
color:#fff;
box-shadow:0 2px 8px rgba(37,99,235,.25);
}

/* Review */
.review-wrap{
border:1px solid #e2e8f0;
border-radius:10px;
padding:14px;
min-height:120px;
font-size:14px;
line-height:1.6;
color:#334155;
background:#f8fafc;
white-space:pre-wrap;
}

/* Buttons */
.btn-row{
display:flex;
gap:10px;
margin-top:16px;
}

.btn{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-weight:600;
cursor:pointer;
font-size:14px;
}

.btn-copy{
background:#fff;
border:1px solid #e2e8f0;
color:#334155;
}
.btn-copy:hover{border-color:#2563eb;color:#2563eb}

.btn-google{
background:#2563eb;
color:#fff;
}
.btn-google:hover{background:#1d4ed8}

/* Toast */
.toast{
position:fixed;
bottom:22px;
left:50%;
transform:translateX(-50%);
background:#2563eb;
color:#fff;
padding:10px 16px;
border-radius:8px;
font-size:13px;
display:none;
box-shadow:0 4px 14px rgba(0,0,0,.15);
}
</style>




<div class="card">
<h2>Review Generator — The Curve Consultants</h2>
<p>Select tone to generate your review</p>

<div class="section-label">Your Rating</div>
<div class="stars-row">
<span class="star active" data-v="1">★</span>

</div>

<div class="tone-row">
<button class="tone-btn selected" data-tone="professional">Professional</button>
<button class="tone-btn" data-tone="casual">Casual</button>
<button class="tone-btn" data-tone="enthusiastic">Enthusiastic</button>
<button class="tone-btn" data-tone="brief">Brief</button>
<button class="tone-btn" data-tone="detailed">Detailed</button>
</div>

<div class="section-label">Generated Review</div>
<div class="review-wrap" id="reviewBox">Select tone to generate review…</div>

<div class="btn-row">
<button class="btn btn-copy" onclick="copyReview()">Copy</button>
<button class="btn btn-google" onclick="openGoogle()">Post on Google</button>
</div>

</div>

<script>
const API_KEY="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";
const GOOGLE_URL="https://www.google.com/search?sca_esv=dbb6f4e1ffc1e896&rlz=1C1ONGR_enIN1111IN1111&sxsrf=ANbL-n4GsEpfaMqeScKyWBkNnD85jp8RYQ:1771948685277&si=AL3DRZEsmMGCryMMFSHJ3StBhOdZ2-6yYkXd_doETEE1OR-qOSFIkZtwPwoKAmkssCqN_zdImxii3dQQDZ2SMLWeth8vGgebObpozcjZUqV86gIgA7dPe4RefuzK6zD8oPioSIZ_mJUBNhBRoOb_SbtmzMNH03GN4g%3D%3D&q=The+Curve+Consultants+Reviews&sa=X&ved=2ahUKEwjRysifv_KSAxW7S3ADHRL-GTYQ0bkNegQIJxAH&biw=1920&bih=953&dpr=1";


let rating=5;
let tone="professional";
let review="";

/* Stars */
document.querySelectorAll(".star").forEach(s=>{
s.onclick=()=>{
rating=+s.dataset.v;
document.querySelectorAll(".star").forEach(x=>x.classList.toggle("active",+x.dataset.v<=rating));
generateReview();
};
});

/* Tone */
document.querySelectorAll(".tone-btn").forEach(b=>{
b.onclick=()=>{
document.querySelectorAll(".tone-btn").forEach(x=>x.classList.remove("selected"));
b.classList.add("selected");
tone=b.dataset.tone;
generateReview();
};
});

function pick(a){return a[Math.floor(Math.random()*a.length)]}

/* Typing */
function typeText(el,text){
el.textContent="";
let i=0;
const iv=setInterval(()=>{
el.textContent+=text[i++];
if(i>=text.length)clearInterval(iv);
},14);
}

/* Generate */
async function generateReview(){

const box=document.getElementById("reviewBox");
box.textContent="Generating review…";

const personas=[
"startup founder scaling operations",
"small business owner improving processes",
"CEO navigating growth challenges",
"marketing head refining strategy",
"operations manager streamlining workflow",
"entrepreneur expanding business"
];

const outcomes=[
"clear strategic direction",
"better business clarity",
"structured growth plan",
"improved team alignment",
"practical actionable advice",
"stronger decision making"
];

const prompt=`You are a real business client who worked with The Curve Consultants, a business and project consulting firm in India while ${pick(personas)}.

Write a ${rating}-star Google review in ${tone} tone.

Mention ${pick(outcomes)} naturally.

Rules:
First person
Natural human writing
No marketing clichés
3 to 6 sentences
Only review text`;

try{
const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"You write realistic consulting client reviews."},
{role:"user",content:prompt}
],
temperature:1.1
})
});

const data=await res.json();
review=data.choices[0].message.content.trim();
typeText(box,review);

}catch{
box.textContent="Could not generate review.";
}
}

/* Copy */
async function copyReview(){
if(!review)return;
await navigator.clipboard.writeText(review);
const toast=document.getElementById("toast");
toast.style.display="block";
setTimeout(()=>toast.style.display="none",1200);
}

/* Google */
function openGoogle(){
window.open(GOOGLE_URL,"_blank");
}

generateReview();
</script>
